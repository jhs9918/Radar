<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFP Radar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      padding: 16px;
      background: #ffffff;
      color: #111827;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo { font-weight: 700; font-size: 16px; }
    .subtitle { font-size: 12px; color: #6b7280; }
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 12px;
      resize: vertical;
      font-family: inherit;
      outline: none;
      color: #374151;
    }
    textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
    textarea::placeholder { color: #9ca3af; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
    #error {
      margin-top: 8px;
      padding: 8px 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 12px;
      color: #dc2626;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">RFP Radar</div>
      <div class="subtitle">Paste RFP text to analyze</div>
    </div>
  </div>

  <textarea
    id="rfp-text"
    placeholder="Paste RFP text here, or highlight text on any page and right-click → 'Analyze with RFP Radar'..."
  ></textarea>

  <div id="error"></div>

  <button id="analyze-btn">Analyze RFP →</button>

  <p class="hint">Opens RFP Radar in a new tab</p>

  <script src="popup.js"></script>
</body>
</html>
